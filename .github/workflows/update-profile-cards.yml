name: Update profile cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/scripts/hide-trophy.py
      - .github/workflows/update-profile-cards.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate trophy card
        uses: ryo-ma/github-profile-trophy@ccb591b887775ee567c0d9a38424ddfb9b1906c4
        with:
          username: ${{ github.repository_owner }}
          output_path: profile/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          theme: onedark

      - name: Hide Reviews trophy
        run: python .github/scripts/hide-trophy.py profile/trophy.svg Reviews

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@6269b9a08af89020bb86cde31485d18c7d41ac33
        with:
          card: stats
          options: username=${{ github.repository_owner }}&include_all_commits=true&theme=monokai
          path: profile/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@6269b9a08af89020bb86cde31485d18c7d41ac33
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&hide=html,Makefile,ASP.NET&layout=compact&theme=monokai
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --cached --quiet && exit 0
          git commit -m "Update profile cards"
          git push

